<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartShop Pro</title>

<!-- 🔴 ADD ADOBE LAUNCH SCRIPT HERE -->
<!-- <script src="YOUR-LAUNCH-SCRIPT.js"></script> -->

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav span {
  margin: 0 10px;
  cursor: pointer;
}

.container {
  padding: 20px;
  text-align: center;
}

.card {
  display: inline-block;
  background: white;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}

button {
  padding: 8px;
  margin-top: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.view { background: #3b82f6; color: white; }
.cart { background: #22c55e; color: white; }

#cartCount {
  background: red;
  padding: 5px 10px;
  border-radius: 50%;
}

.success {
  margin-top: 20px;
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <div>🛒 SmartShop</div>
  <nav>
    <span onclick="loadCategory('Mobiles')">Mobiles</span>
    <span onclick="loadCategory('Laptops')">Laptops</span>
    <span onclick="loadCategory('Fashion')">Fashion</span>
  </nav>
  <div>
    Cart: <span id="cartCount">0</span>
    <button onclick="checkout()">Checkout</button>
    <button onclick="purchase()">Buy Now</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>
// =======================
// ✅ DATA LAYER
// =======================
window.dataLayer = window.dataLayer || [];
function pushDL(obj){
  window.dataLayer.push(obj);
  console.log("🔥 DL:", obj);
}

// =======================
// 📦 PRODUCTS
// =======================
const products = [
  {id:1, name:"iPhone 15", category:"Mobiles", price:80000},
  {id:2, name:"Samsung S23", category:"Mobiles", price:70000},
  {id:3, name:"MacBook Pro", category:"Laptops", price:150000},
  {id:4, name:"Dell XPS", category:"Laptops", price:120000},
  {id:5, name:"T-Shirt", category:"Fashion", price:1000},
  {id:6, name:"Cap", category:"Fashion", price:500}
];

let cart = [];
let currentProduct = null;

// =======================
// 🔹 PAGE LOAD
// =======================
pushDL({
  event: "page_view",
  page_name: "Home"
});

// =======================
// 🛍️ PLP
// =======================
function loadCategory(cat){
  let html = `<h2>${cat}</h2>`;

  products.filter(p => p.category === cat).forEach(p => {
    html += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="view" onclick="viewProduct(${p.id})">View</button>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;

  pushDL({
    event: "plp_view",
    category: cat
  });
}

// =======================
// 🔍 PDP
// =======================
function viewProduct(id){
  let p = products.find(x => x.id === id);
  currentProduct = p;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>${p.name}</h2>
      <p>Category: ${p.category}</p>
      <p>Price: ₹${p.price}</p>
      <button class="cart" onclick="addToCart()">Add to Cart</button>
    </div>
  `;

  pushDL({
    event: "pdp_view",
    product_name: p.name,
    category: p.category,
    price: p.price
  });
}

// =======================
// 🛒 ADD TO CART
// =======================
function addToCart(){
  cart.push(currentProduct);
  document.getElementById("cartCount").innerText = cart.length;

  pushDL({
    event: "add_to_cart",
    product_name: currentProduct.name,
    price: currentProduct.price
  });

  alert("Added to cart: " + currentProduct.name);
}

// =======================
// 💳 CHECKOUT
// =======================
function checkout(){
  pushDL({
    event: "checkout",
    cart_size: cart.length
  });

  alert("Checkout started with " + cart.length + " items");
}

// =======================
// 🎉 PURCHASE (FIXED)
// =======================
function purchase(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  let total = cart.reduce((sum,p)=>sum+p.price,0);
  let names = cart.map(p=>p.name).join(", ");

  pushDL({
    event: "purchase",
    revenue: total,
    items: cart.length,
    product_names: names
  });

  document.getElementById("app").innerHTML = `
    <div class="success">
      🎉 Purchased: ${names} <br>
      Total: ₹${total}
    </div>
  `;

  cart = [];
  document.getElementById("cartCount").innerText = 0;
}

</script>

</body>
</html>
